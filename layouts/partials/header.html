<header class="site-header">
  <div class="wrap site-header__inner">
    <a class="site-header__brand" href="{{ "/" | relURL }}">
      <span class="brand-mark">CG</span>
      <span class="brand-name">{{ .Site.Params.name }}</span>
    </a>
    <nav class="site-nav">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL | relURL }}">{{ .Name }}</a>
      {{ end }}
      <a href="#contact" class="site-nav__cta">Contact</a>
    </nav>
  </div>
</header>
